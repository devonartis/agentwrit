<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#16213e">AgentAuth — System Overview</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#6b7280">How the four personas interact with each component (no infrastructure)</text>

  <!-- ===== PERSONA CARDS (top row) ===== -->

  <!-- Operator -->
  <rect x="30" y="80" width="220" height="100" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  <rect x="30" y="80" width="220" height="4" rx="2" fill="#ef4444"/>
  <text x="140" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Building Manager</text>
  <text x="140" y="124" text-anchor="middle" font-size="11" fill="#6b7280">(Operator)</text>
  <text x="140" y="144" text-anchor="middle" font-size="10" fill="#374151">Registers apps, sets permissions,</text>
  <text x="140" y="158" text-anchor="middle" font-size="10" fill="#374151">revokes access, reads audit</text>
  <text x="140" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Has the master key</text>

  <!-- Developer -->
  <rect x="270" y="80" width="220" height="100" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <rect x="270" y="80" width="220" height="4" rx="2" fill="#3b82f6"/>
  <text x="380" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">3rd Party Developer</text>
  <text x="380" y="124" text-anchor="middle" font-size="11" fill="#6b7280">(Tenant)</text>
  <text x="380" y="144" text-anchor="middle" font-size="10" fill="#374151">Gets entry pass, writes code,</text>
  <text x="380" y="158" text-anchor="middle" font-size="10" fill="#374151">talks ONLY to local helper</text>
  <text x="380" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Never gets master key</text>

  <!-- Running App -->
  <rect x="510" y="80" width="220" height="100" rx="10" fill="white" stroke="#22c55e" stroke-width="2"/>
  <rect x="510" y="80" width="220" height="4" rx="2" fill="#22c55e"/>
  <text x="620" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Running App</text>
  <text x="620" y="124" text-anchor="middle" font-size="11" fill="#6b7280">(The Software)</text>
  <text x="620" y="144" text-anchor="middle" font-size="10" fill="#374151">Starts, requests keys for agents,</text>
  <text x="620" y="158" text-anchor="middle" font-size="10" fill="#374151">handles errors, releases keys</text>
  <text x="620" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Talks to helper only</text>

  <!-- AI Agent -->
  <rect x="750" y="80" width="220" height="100" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <rect x="750" y="80" width="220" height="4" rx="2" fill="#f59e0b"/>
  <text x="860" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">AI Agent</text>
  <text x="860" y="124" text-anchor="middle" font-size="11" fill="#6b7280">(Guest)</text>
  <text x="860" y="144" text-anchor="middle" font-size="10" fill="#374151">Gets temporary key, uses it,</text>
  <text x="860" y="158" text-anchor="middle" font-size="10" fill="#374151">returns it when done</text>
  <text x="860" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">Key only gets narrower</text>

  <!-- ===== ARCHITECTURE COMPONENTS ===== -->

  <!-- Admin Console (aactl) -->
  <rect x="50" y="240" width="180" height="90" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="140" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Admin Console</text>
  <text x="140" y="288" text-anchor="middle" font-size="10" fill="#7f1d1d">Register apps, revoke access,</text>
  <text x="140" y="302" text-anchor="middle" font-size="10" fill="#7f1d1d">view audit trail</text>

  <!-- Helper (Sidecar) -->
  <rect x="310" y="240" width="180" height="90" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Helper (Sidecar)</text>
  <text x="400" y="286" text-anchor="middle" font-size="10" fill="#064e3b">Runs alongside app</text>
  <text x="400" y="300" text-anchor="middle" font-size="10" fill="#064e3b">Checks permissions, caches keys</text>

  <!-- Security Desk (Broker) -->
  <rect x="560" y="240" width="200" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Security Desk (Broker)</text>
  <text x="660" y="286" text-anchor="middle" font-size="10" fill="#78350f">Issues keys, validates identity,</text>
  <text x="660" y="300" text-anchor="middle" font-size="10" fill="#78350f">enforces rules, logs everything</text>

  <!-- Database -->
  <rect x="830" y="250" width="140" height="70" rx="10" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="900" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Database</text>
  <text x="900" y="296" text-anchor="middle" font-size="10" fill="#6b21a8">Audit, agents, revocations</text>

  <!-- Resource Server -->
  <rect x="560" y="420" width="200" height="70" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="660" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">Resource Server</text>
  <text x="660" y="468" text-anchor="middle" font-size="10" fill="#312e81">APIs, data, files the agent accesses</text>

  <!-- ===== ARROWS ===== -->

  <!-- Operator → Admin Console -->
  <line x1="140" y1="180" x2="140" y2="235" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="148" y="212" font-size="9" fill="#ef4444">uses</text>

  <!-- Admin Console → Broker -->
  <line x1="230" y1="285" x2="555" y2="285" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="390" y="278" font-size="9" fill="#ef4444">admin commands</text>

  <!-- Developer → Helper (conceptual, writes code that talks to helper) -->
  <line x1="380" y1="180" x2="400" y2="235" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="395" y="212" font-size="9" fill="#3b82f6">writes code for</text>

  <!-- Running App → Helper -->
  <line x1="620" y1="180" x2="440" y2="235" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="510" y="200" font-size="9" fill="#22c55e" font-weight="600">localhost only</text>

  <!-- Helper → Broker -->
  <line x1="490" y1="285" x2="555" y2="285" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="516" y="278" font-size="9" fill="#6b7280">credentials</text>

  <!-- Broker → Database -->
  <line x1="760" y1="285" x2="825" y2="285" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="278" font-size="9" fill="#8b5cf6">stores</text>

  <!-- Running App → Agent (gives key) -->
  <path d="M 760 160 Q 820 160 860 180" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="4,3"/>
  <text x="800" y="155" font-size="9" fill="#22c55e">gives key</text>

  <!-- Agent → Resource Server (uses key) -->
  <line x1="860" y1="180" x2="720" y2="415" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="810" y="310" font-size="9" fill="#d97706" font-weight="600">uses key</text>
  <text x="810" y="322" font-size="9" fill="#d97706">to access</text>

  <!-- ===== GAP CALLOUT ===== -->
  <rect x="50" y="530" width="900" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="70" y="555" font-size="14" font-weight="700" fill="#dc2626">BLOCKER: App Registration Does Not Exist</text>
  <text x="70" y="575" font-size="12" fill="#7f1d1d">Today, there is no way to register an app through the admin console. Adding an app requires editing</text>
  <text x="70" y="592" font-size="12" fill="#7f1d1d">infrastructure files and sharing the master key with every app. This is the #1 gap. (G-1 through G-6)</text>

  <!-- ===== LEGEND ===== -->
  <rect x="50" y="640" width="900" height="60" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="70" y="662" font-size="10" font-weight="600" fill="#6b7280">LEGEND:</text>
  <rect x="130" y="650" width="14" height="14" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="662" font-size="10" fill="#4b5563">Operator / Admin</text>
  <rect x="270" y="650" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="662" font-size="10" fill="#4b5563">Developer</text>
  <rect x="380" y="650" width="14" height="14" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="662" font-size="10" fill="#4b5563">Helper (Sidecar)</text>
  <rect x="520" y="650" width="14" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="662" font-size="10" fill="#4b5563">Security Desk (Broker)</text>
  <rect x="690" y="650" width="14" height="14" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="710" y="662" font-size="10" fill="#4b5563">Resource Server</text>
  <rect x="830" y="650" width="14" height="14" rx="3" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="850" y="662" font-size="10" fill="#4b5563">Database</text>

  <!-- Solid vs dashed -->
  <line x1="130" y1="685" x2="165" y2="685" stroke="#6b7280" stroke-width="2"/>
  <text x="172" y="688" font-size="10" fill="#4b5563">Direct connection</text>
  <line x1="310" y1="685" x2="345" y2="685" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="352" y="688" font-size="10" fill="#4b5563">Indirect / admin command</text>
</svg>
