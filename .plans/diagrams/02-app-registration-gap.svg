<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1000" height="650" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#16213e">App Registration — #1 Gap</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#6b7280">Side-by-side: what happens today vs. what production needs</text>

  <!-- ===== LEFT: TODAY (broken) ===== -->
  <rect x="20" y="75" width="470" height="520" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="20" y="75" width="470" height="32" rx="12" fill="#dc2626"/>
  <rect x="20" y="95" width="470" height="12" fill="#dc2626"/>
  <text x="255" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="white">TODAY (Broken)</text>

  <!-- Step 1 -->
  <circle cx="60" cy="140" r="14" fill="#ef4444"/>
  <text x="60" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
  <text x="84" y="137" font-size="12" font-weight="600" fill="#991b1b">Operator edits docker-compose.yml</text>
  <text x="84" y="153" font-size="10" fill="#7f1d1d">Manual infrastructure file change</text>

  <line x1="60" y1="156" x2="60" y2="175" stroke="#fca5a5" stroke-width="2"/>

  <!-- Step 2 -->
  <circle cx="60" cy="190" r="14" fill="#ef4444"/>
  <text x="60" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
  <text x="84" y="188" font-size="12" font-weight="600" fill="#991b1b">Pastes MASTER KEY into the file</text>
  <text x="84" y="204" font-size="10" fill="#7f1d1d">Every app gets full admin access</text>
  <rect x="330" y="178" width="140" height="24" rx="4" fill="#dc2626"/>
  <text x="400" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="white">SECURITY RISK</text>

  <line x1="60" y1="206" x2="60" y2="225" stroke="#fca5a5" stroke-width="2"/>

  <!-- Step 3 -->
  <circle cx="60" cy="240" r="14" fill="#ef4444"/>
  <text x="60" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="white">3</text>
  <text x="84" y="238" font-size="12" font-weight="600" fill="#991b1b">Runs docker compose up</text>
  <text x="84" y="254" font-size="10" fill="#7f1d1d">Requires infrastructure access to add an app</text>

  <line x1="60" y1="256" x2="60" y2="275" stroke="#fca5a5" stroke-width="2"/>

  <!-- Step 4 -->
  <circle cx="60" cy="290" r="14" fill="#ef4444"/>
  <text x="60" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="white">4</text>
  <text x="84" y="288" font-size="12" font-weight="600" fill="#991b1b">Helper self-provisions</text>
  <text x="84" y="304" font-size="10" fill="#7f1d1d">Uses master key to create its own activation</text>

  <line x1="60" y1="306" x2="60" y2="325" stroke="#fca5a5" stroke-width="2"/>

  <!-- Step 5 -->
  <circle cx="60" cy="340" r="14" fill="#ef4444"/>
  <text x="60" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="white">5</text>
  <text x="84" y="338" font-size="12" font-weight="600" fill="#991b1b">Helper holds master key FOREVER</text>
  <text x="84" y="354" font-size="10" fill="#7f1d1d">Compromised helper = full admin access</text>

  <!-- Problems box -->
  <rect x="40" y="385" width="430" height="190" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="60" y="410" font-size="12" font-weight="700" fill="#dc2626">What's wrong with this:</text>
  <circle cx="55" cy="432" r="4" fill="#dc2626"/>
  <text x="68" y="437" font-size="11" fill="#7f1d1d">Apps are invisible to the system (no app entity)</text>
  <circle cx="55" cy="455" r="4" fill="#dc2626"/>
  <text x="68" y="460" font-size="11" fill="#7f1d1d">No API to register — must edit infrastructure files</text>
  <circle cx="55" cy="478" r="4" fill="#dc2626"/>
  <text x="68" y="483" font-size="11" fill="#7f1d1d">Master key shared with every app</text>
  <circle cx="55" cy="501" r="4" fill="#dc2626"/>
  <text x="68" y="506" font-size="11" fill="#7f1d1d">Helpers boot whether or not apps exist</text>
  <circle cx="55" cy="524" r="4" fill="#dc2626"/>
  <text x="68" y="529" font-size="11" fill="#7f1d1d">No app-to-helper binding (can't revoke by app)</text>
  <circle cx="55" cy="547" r="4" fill="#dc2626"/>
  <text x="68" y="552" font-size="11" fill="#7f1d1d">3rd party developer needs admin access to connect</text>

  <!-- ===== RIGHT: TARGET (correct) ===== -->
  <rect x="510" y="75" width="470" height="520" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <rect x="510" y="75" width="470" height="32" rx="12" fill="#22c55e"/>
  <rect x="510" y="95" width="470" height="12" fill="#22c55e"/>
  <text x="745" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="white">TARGET (Production Ready)</text>

  <!-- Step 1 -->
  <circle cx="550" cy="140" r="14" fill="#22c55e"/>
  <text x="550" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
  <text x="574" y="137" font-size="12" font-weight="600" fill="#166534">Operator registers app via API</text>
  <text x="574" y="153" font-size="10" fill="#14532d">aactl app register --name my-app --scopes ...</text>

  <line x1="550" y1="156" x2="550" y2="175" stroke="#86efac" stroke-width="2"/>

  <!-- Step 2 -->
  <circle cx="550" cy="190" r="14" fill="#22c55e"/>
  <text x="550" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
  <text x="574" y="188" font-size="12" font-weight="600" fill="#166534">Gets one-time entry pass back</text>
  <text x="574" y="204" font-size="10" fill="#14532d">Single-use activation token with scope ceiling</text>

  <line x1="550" y1="206" x2="550" y2="225" stroke="#86efac" stroke-width="2"/>

  <!-- Step 3 -->
  <circle cx="550" cy="240" r="14" fill="#22c55e"/>
  <text x="550" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="white">3</text>
  <text x="574" y="238" font-size="12" font-weight="600" fill="#166534">Gives pass to developer</text>
  <text x="574" y="254" font-size="10" fill="#14532d">Via secret manager, encrypted channel — NOT master key</text>
  <rect x="820" y="228" width="140" height="24" rx="4" fill="#22c55e"/>
  <text x="890" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="white">SECURE</text>

  <line x1="550" y1="256" x2="550" y2="275" stroke="#86efac" stroke-width="2"/>

  <!-- Step 4 -->
  <circle cx="550" cy="290" r="14" fill="#22c55e"/>
  <text x="550" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="white">4</text>
  <text x="574" y="288" font-size="12" font-weight="600" fill="#166534">Developer deploys with entry pass</text>
  <text x="574" y="304" font-size="10" fill="#14532d">Two env vars: activation token + broker URL</text>

  <line x1="550" y1="306" x2="550" y2="325" stroke="#86efac" stroke-width="2"/>

  <!-- Step 5 -->
  <circle cx="550" cy="340" r="14" fill="#22c55e"/>
  <text x="550" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="white">5</text>
  <text x="574" y="338" font-size="12" font-weight="600" fill="#166534">Helper activates (pass consumed)</text>
  <text x="574" y="354" font-size="10" fill="#14532d">Gets scoped credentials only. No admin access. Ever.</text>

  <!-- Benefits box -->
  <rect x="530" y="385" width="430" height="190" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="550" y="410" font-size="12" font-weight="700" fill="#16a34a">What this fixes:</text>
  <circle cx="545" cy="432" r="4" fill="#22c55e"/>
  <text x="558" y="437" font-size="11" fill="#14532d">Apps are first-class entities (trackable, auditable)</text>
  <circle cx="545" cy="455" r="4" fill="#22c55e"/>
  <text x="558" y="460" font-size="11" fill="#14532d">Registration is an API call, not an infra change</text>
  <circle cx="545" cy="478" r="4" fill="#22c55e"/>
  <text x="558" y="483" font-size="11" fill="#14532d">Master key stays with operator, never shared</text>
  <circle cx="545" cy="501" r="4" fill="#22c55e"/>
  <text x="558" y="506" font-size="11" fill="#14532d">Each helper has minimum credentials needed</text>
  <circle cx="545" cy="524" r="4" fill="#22c55e"/>
  <text x="558" y="529" font-size="11" fill="#14532d">Apps bound to helpers (revoke by app name)</text>
  <circle cx="545" cy="547" r="4" fill="#22c55e"/>
  <text x="558" y="552" font-size="11" fill="#14532d">3rd party developer never touches admin</text>

  <!-- Bottom note -->
  <rect x="20" y="610" width="960" height="30" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="500" y="631" text-anchor="middle" font-size="11" fill="#1e40af">Half the plumbing exists: POST /v1/sidecar/activate works. The helper just bypasses it by self-provisioning with the master key.</text>
</svg>
