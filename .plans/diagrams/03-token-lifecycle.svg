<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="a-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1000" height="500" fill="#f8f9fa" rx="8"/>

  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#16213e">Token (Key Card) Lifecycle</text>
  <text x="500" y="54" text-anchor="middle" font-size="12" fill="#6b7280">From issuance to expiry or revocation — every key's journey</text>

  <!-- ===== HAPPY PATH ===== -->
  <text x="50" y="95" font-size="13" font-weight="600" fill="#374151">Normal Flow:</text>

  <!-- Issued -->
  <rect x="50" y="110" width="150" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">ISSUED</text>
  <text x="125" y="156" text-anchor="middle" font-size="10" fill="#1e3a5f">Agent gets a key</text>
  <text x="125" y="170" text-anchor="middle" font-size="10" fill="#1e3a5f">with specific scope</text>

  <line x1="200" y1="145" x2="240" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>

  <!-- Used -->
  <rect x="245" y="110" width="150" height="70" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">USED</text>
  <text x="320" y="156" text-anchor="middle" font-size="10" fill="#064e3b">Agent accesses</text>
  <text x="320" y="170" text-anchor="middle" font-size="10" fill="#064e3b">resources with key</text>

  <line x1="395" y1="145" x2="435" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>

  <!-- Renewed -->
  <rect x="440" y="110" width="150" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="515" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">RENEWED</text>
  <text x="515" y="156" text-anchor="middle" font-size="10" fill="#78350f">Before expiry, helper</text>
  <text x="515" y="170" text-anchor="middle" font-size="10" fill="#78350f">gets fresh key (auto)</text>

  <line x1="590" y1="145" x2="630" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>

  <!-- Released -->
  <rect x="635" y="110" width="150" height="70" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="710" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#9d174d">RELEASED</text>
  <text x="710" y="156" text-anchor="middle" font-size="10" fill="#831843">Agent done, key</text>
  <text x="710" y="170" text-anchor="middle" font-size="10" fill="#831843">destroyed immediately</text>

  <line x1="785" y1="145" x2="825" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>

  <!-- Done -->
  <rect x="830" y="120" width="120" height="50" rx="25" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <text x="890" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">DONE</text>

  <!-- ===== REVOCATION (can happen at any point) ===== -->
  <text x="50" y="230" font-size="13" font-weight="600" fill="#dc2626">Operator can revoke at any point — 4 levels:</text>

  <!-- Revoke by token -->
  <rect x="50" y="250" width="200" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="150" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Revoke: ONE KEY</text>
  <text x="150" y="295" text-anchor="middle" font-size="10" fill="#991b1b">"This specific key was leaked"</text>
  <text x="150" y="312" text-anchor="middle" font-size="10" fill="#991b1b">Only that key stops working</text>

  <!-- Revoke by agent -->
  <rect x="270" y="250" width="200" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="370" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Revoke: ONE AGENT</text>
  <text x="370" y="295" text-anchor="middle" font-size="10" fill="#991b1b">"This agent is compromised"</text>
  <text x="370" y="312" text-anchor="middle" font-size="10" fill="#991b1b">ALL of its keys die</text>

  <!-- Revoke by task -->
  <rect x="490" y="250" width="200" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Revoke: ENTIRE TASK</text>
  <text x="590" y="295" text-anchor="middle" font-size="10" fill="#991b1b">"This whole task went wrong"</text>
  <text x="590" y="312" text-anchor="middle" font-size="10" fill="#991b1b">All agents on this task die</text>

  <!-- Revoke by chain -->
  <rect x="710" y="250" width="240" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="830" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Revoke: ENTIRE CHAIN</text>
  <text x="830" y="295" text-anchor="middle" font-size="10" fill="#991b1b">"Kill A and everyone A delegated to"</text>
  <text x="830" y="312" text-anchor="middle" font-size="10" fill="#991b1b">Whole delegation chain dies</text>

  <!-- Status bar -->
  <rect x="50" y="365" width="900" height="40" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="500" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">STATUS: Token lifecycle works correctly. All 4 revocation levels, renewal, and release are implemented.</text>

  <!-- Gaps -->
  <rect x="50" y="420" width="430" height="60" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="70" y="442" font-size="11" font-weight="700" fill="#d97706">GAP G-10: MAJOR</text>
  <text x="70" y="460" font-size="10" fill="#92400e">Broker restart = all keys invalid. Signing key is ephemeral (generated fresh each startup).</text>

  <rect x="500" y="420" width="450" height="60" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="520" y="442" font-size="11" font-weight="700" fill="#d97706">GAP G-12: MAJOR</text>
  <text x="520" y="460" font-size="10" fill="#92400e">Revocation only works on one broker instance. Multiple brokers don't share revocations.</text>
</svg>
