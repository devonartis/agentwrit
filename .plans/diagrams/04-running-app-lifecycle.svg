<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="1000" height="700" fill="#f8f9fa" rx="8"/>

  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#16213e">Running App — Full Lifecycle</text>
  <text x="500" y="54" text-anchor="middle" font-size="12" fill="#6b7280">What the app does from startup to shutdown — the software's perspective</text>

  <!-- ===== SWIM LANES ===== -->

  <!-- Lane headers -->
  <rect x="20" y="75" width="240" height="30" rx="6" fill="#dbeafe"/>
  <text x="140" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">APP</text>

  <rect x="280" y="75" width="240" height="30" rx="6" fill="#d1fae5"/>
  <text x="400" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">HELPER (Sidecar)</text>

  <rect x="540" y="75" width="240" height="30" rx="6" fill="#fef3c7"/>
  <text x="660" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">SECURITY DESK (Broker)</text>

  <rect x="800" y="75" width="180" height="30" rx="6" fill="#e0e7ff"/>
  <text x="890" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">RESOURCE SERVER</text>

  <!-- Lane dividers -->
  <line x1="270" y1="75" x2="270" y2="690" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="530" y1="75" x2="530" y2="690" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="790" y1="75" x2="790" y2="690" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== PHASE 1: STARTUP ===== -->
  <rect x="10" y="115" width="980" height="24" rx="4" fill="#eff6ff"/>
  <text x="20" y="132" font-size="11" font-weight="700" fill="#2563eb">PHASE 1: STARTUP</text>

  <!-- App starts -->
  <rect x="40" y="150" width="200" height="36" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="173" text-anchor="middle" font-size="11" fill="#1e40af">App process starts</text>

  <!-- Helper starts -->
  <rect x="300" y="150" width="200" height="36" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="173" text-anchor="middle" font-size="11" fill="#065f46">Helper starts alongside</text>

  <!-- Arrow: Helper → Broker (activate) -->
  <line x1="400" y1="190" x2="400" y2="210" stroke="#10b981" stroke-width="1.5"/>
  <rect x="300" y="210" width="200" height="36" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="233" text-anchor="middle" font-size="11" fill="#065f46">Send entry pass to broker</text>

  <line x1="500" y1="228" x2="560" y2="228" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="560" y="210" width="200" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="228" text-anchor="middle" font-size="10" fill="#92400e">Validate pass, issue</text>
  <text x="660" y="240" text-anchor="middle" font-size="10" fill="#92400e">scoped credentials</text>

  <line x1="560" y1="240" x2="500" y2="260" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="300" y="256" width="200" height="28" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">READY (health = ok)</text>

  <!-- ===== PHASE 2: NORMAL OPERATION ===== -->
  <rect x="10" y="300" width="980" height="24" rx="4" fill="#f0fdf4"/>
  <text x="20" y="317" font-size="11" font-weight="700" fill="#16a34a">PHASE 2: NORMAL OPERATION (repeats for every agent task)</text>

  <!-- App requests key -->
  <rect x="40" y="335" width="200" height="36" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="352" text-anchor="middle" font-size="10" fill="#1e40af">"Need key for my-agent,</text>
  <text x="140" y="364" text-anchor="middle" font-size="10" fill="#1e40af">read:code:proj-42, 5 min"</text>

  <line x1="240" y1="353" x2="295" y2="353" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Helper checks ceiling -->
  <rect x="300" y="335" width="200" height="36" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="352" text-anchor="middle" font-size="10" fill="#065f46">Check: within my ceiling?</text>
  <text x="400" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">YES -> continue</text>

  <!-- Helper → Broker exchange -->
  <line x1="500" y1="353" x2="555" y2="353" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="560" y="335" width="200" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="352" text-anchor="middle" font-size="10" fill="#92400e">Validate, double-check scope,</text>
  <text x="660" y="364" text-anchor="middle" font-size="10" fill="#92400e">issue signed agent key</text>

  <!-- Key flows back -->
  <line x1="560" y1="371" x2="500" y2="390" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="300" y="382" width="200" height="28" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="401" text-anchor="middle" font-size="10" fill="#065f46">Pass key back to app</text>

  <line x1="300" y1="396" x2="240" y2="396" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- App gives key to agent, agent uses it -->
  <rect x="40" y="382" width="200" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="401" text-anchor="middle" font-size="10" fill="#1e40af">Give key to AI agent</text>

  <line x1="140" y1="414" x2="140" y2="430" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Agent uses key on resource -->
  <rect x="40" y="430" width="200" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="449" text-anchor="middle" font-size="10" fill="#92400e">Agent uses key on resource</text>

  <line x1="240" y1="444" x2="810" y2="444" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a)"/>

  <rect x="815" y="430" width="160" height="28" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="895" y="449" text-anchor="middle" font-size="10" fill="#3730a3">Check key, serve data</text>

  <!-- ===== PHASE 3: ERRORS ===== -->
  <rect x="10" y="478" width="980" height="24" rx="4" fill="#fef2f2"/>
  <text x="20" y="495" font-size="11" font-weight="700" fill="#dc2626">PHASE 3: WHEN THINGS GO WRONG</text>

  <rect x="40" y="510" width="280" height="60" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="60" y="530" font-size="11" font-weight="600" fill="#dc2626">Broker down</text>
  <text x="60" y="546" font-size="10" fill="#7f1d1d">Helper retries, serves cached keys</text>
  <text x="60" y="560" font-size="10" fill="#7f1d1d">if available. App gets 503 if not.</text>

  <rect x="350" y="510" width="280" height="60" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="370" y="530" font-size="11" font-weight="600" fill="#dc2626">Scope exceeded</text>
  <text x="370" y="546" font-size="10" fill="#7f1d1d">Helper rejects immediately: 403.</text>
  <text x="370" y="560" font-size="10" fill="#7f1d1d">Ask operator to expand permissions.</text>

  <rect x="660" y="510" width="320" height="60" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="680" y="530" font-size="11" font-weight="600" fill="#dc2626">Key expired</text>
  <text x="680" y="546" font-size="10" fill="#7f1d1d">Resource returns 401. App requests new key</text>
  <text x="680" y="560" font-size="10" fill="#7f1d1d">from helper, gives to agent, agent retries.</text>

  <!-- ===== PHASE 4: SHUTDOWN ===== -->
  <rect x="10" y="590" width="980" height="24" rx="4" fill="#f3f4f6"/>
  <text x="20" y="607" font-size="11" font-weight="700" fill="#6b7280">PHASE 4: SHUTDOWN</text>

  <rect x="40" y="625" width="200" height="50" rx="6" fill="white" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="140" y="645" text-anchor="middle" font-size="10" fill="#374151">Release all active keys</text>
  <text x="140" y="660" text-anchor="middle" font-size="10" fill="#6b7280">(good hygiene)</text>

  <line x1="240" y1="650" x2="295" y2="650" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="300" y="625" width="200" height="50" rx="6" fill="white" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="400" y="645" text-anchor="middle" font-size="10" fill="#374151">Helper shuts down</text>
  <text x="400" y="660" text-anchor="middle" font-size="10" fill="#6b7280">Stops accepting requests</text>

  <line x1="500" y1="650" x2="555" y2="650" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="560" y="625" width="200" height="50" rx="6" fill="white" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="660" y="645" text-anchor="middle" font-size="10" fill="#374151">Audit: app shutdown</text>
  <text x="660" y="660" text-anchor="middle" font-size="10" fill="#6b7280">logged for compliance</text>

  <!-- missing arrowhead def for this file -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
