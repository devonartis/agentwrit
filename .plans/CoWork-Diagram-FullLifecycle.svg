<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body, text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
    <!-- Subtle shadows -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08" flood-color="#0A2540"/>
    </filter>
    <filter id="shadow-light" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06" flood-color="#0A2540"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#425466" opacity="0.7"/>
    </marker>
    <marker id="arrowhead-light" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#425466" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FFFFFF"/>

  <!-- Title Bar -->
  <rect width="1400" height="80" fill="#0A2540"/>
  <text x="700" y="48" font-size="32" font-weight="600" text-anchor="middle" fill="#FFFFFF">
    Complete Agent Lifecycle — Ephemeral Agent Credentialing Pattern
  </text>

  <!-- Row 1: Stages 1-4 (0-3) -->

  <!-- Stage 1: App Registration -->
  <g>
    <!-- Card Background -->
    <rect x="50" y="130" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Purple accent bar at top -->
    <rect x="50" y="130" width="280" height="6" rx="12" fill="#635BFF"/>

    <!-- Icon/Number -->
    <circle cx="80" cy="165" r="18" fill="#635BFF" opacity="0.15"/>
    <text x="80" y="172" font-size="20" font-weight="600" text-anchor="middle" fill="#635BFF">1</text>

    <!-- Title -->
    <text x="70" y="195" font-size="16" font-weight="600" fill="#0A2540">App Registration</text>

    <!-- Description -->
    <text x="70" y="220" font-size="13" fill="#425466">Operator registers app via aactl</text>
    <text x="70" y="238" font-size="13" fill="#425466">→ gets client_id +</text>
    <text x="70" y="256" font-size="13" fill="#425466">client_secret + scope ceiling</text>

    <!-- Badge -->
    <rect x="70" y="280" width="70" height="28" rx="14" fill="#635BFF" opacity="0.1"/>
    <text x="105" y="301" font-size="11" font-weight="600" text-anchor="middle" fill="#635BFF">NEW</text>
  </g>

  <!-- Stage 2: App Authentication -->
  <g>
    <!-- Card Background -->
    <rect x="370" y="130" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Purple accent bar at top -->
    <rect x="370" y="130" width="280" height="6" rx="12" fill="#635BFF"/>

    <!-- Icon/Number -->
    <circle cx="400" cy="165" r="18" fill="#635BFF" opacity="0.15"/>
    <text x="400" y="172" font-size="20" font-weight="600" text-anchor="middle" fill="#635BFF">2</text>

    <!-- Title -->
    <text x="390" y="195" font-size="16" font-weight="600" fill="#0A2540">App Authentication</text>

    <!-- Description -->
    <text x="390" y="220" font-size="13" fill="#425466">App sends client_id +</text>
    <text x="390" y="238" font-size="13" fill="#425466">client_secret → broker</text>
    <text x="390" y="256" font-size="13" fill="#425466">returns scoped app JWT</text>

    <!-- Badge -->
    <rect x="390" y="280" width="70" height="28" rx="14" fill="#635BFF" opacity="0.1"/>
    <text x="425" y="301" font-size="11" font-weight="600" text-anchor="middle" fill="#635BFF">NEW</text>
  </g>

  <!-- Stage 3: Launch Token -->
  <g>
    <!-- Card Background -->
    <rect x="690" y="130" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Teal accent bar at top -->
    <rect x="690" y="130" width="280" height="6" rx="12" fill="#00D4AA"/>

    <!-- Icon/Number -->
    <circle cx="720" cy="165" r="18" fill="#00D4AA" opacity="0.15"/>
    <text x="720" y="172" font-size="20" font-weight="600" text-anchor="middle" fill="#00D4AA">3</text>

    <!-- Title -->
    <text x="710" y="195" font-size="16" font-weight="600" fill="#0A2540">Launch Token</text>

    <!-- Description -->
    <text x="710" y="220" font-size="13" fill="#425466">App creates launch token</text>
    <text x="710" y="238" font-size="13" fill="#425466">within scope ceiling →</text>
    <text x="710" y="256" font-size="13" fill="#425466">single-use, TTL-capped</text>

    <!-- Badge -->
    <rect x="710" y="280" width="85" height="28" rx="14" fill="#00D4AA" opacity="0.2"/>
    <text x="752" y="301" font-size="11" font-weight="600" text-anchor="middle" fill="#00D4AA">PRESERVED</text>
  </g>

  <!-- Stage 4: Agent Identity -->
  <g>
    <!-- Card Background -->
    <rect x="1010" y="130" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Teal accent bar at top -->
    <rect x="1010" y="130" width="280" height="6" rx="12" fill="#00D4AA"/>

    <!-- Icon/Number -->
    <circle cx="1040" cy="165" r="18" fill="#00D4AA" opacity="0.15"/>
    <text x="1040" y="172" font-size="20" font-weight="600" text-anchor="middle" fill="#00D4AA">4</text>

    <!-- Title -->
    <text x="1030" y="195" font-size="16" font-weight="600" fill="#0A2540">Agent Identity</text>

    <!-- Description -->
    <text x="1030" y="220" font-size="13" fill="#425466">Ed25519 keypair generated</text>
    <text x="1030" y="238" font-size="13" fill="#425466">→ challenge-response →</text>
    <text x="1030" y="256" font-size="13" fill="#425466">nonce signed → SPIFFE ID</text>

    <!-- Badge -->
    <rect x="1030" y="280" width="85" height="28" rx="14" fill="#00D4AA" opacity="0.2"/>
    <text x="1072" y="301" font-size="11" font-weight="600" text-anchor="middle" fill="#00D4AA">PRESERVED</text>
  </g>

  <!-- Arrows Row 1 -->
  <!-- 1 to 2 -->
  <path d="M 330 240 L 370 240" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- 2 to 3 -->
  <path d="M 650 240 L 690 240" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- 3 to 4 -->
  <path d="M 970 240 L 1010 240" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- Row 2: Stages 5-8 (4-7) -->

  <!-- Stage 5: Token Issuance -->
  <g>
    <!-- Card Background -->
    <rect x="50" y="450" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Teal accent bar at top -->
    <rect x="50" y="450" width="280" height="6" rx="12" fill="#00D4AA"/>

    <!-- Icon/Number -->
    <circle cx="80" cy="485" r="18" fill="#00D4AA" opacity="0.15"/>
    <text x="80" y="492" font-size="20" font-weight="600" text-anchor="middle" fill="#00D4AA">5</text>

    <!-- Title -->
    <text x="70" y="515" font-size="16" font-weight="600" fill="#0A2540">Token Issuance</text>

    <!-- Description -->
    <text x="70" y="540" font-size="13" fill="#425466">Broker issues short-lived JWT</text>
    <text x="70" y="558" font-size="13" fill="#425466">with: sub, aud, exp, jti,</text>
    <text x="70" y="576" font-size="13" fill="#425466">scope, app_id</text>

    <!-- Badge -->
    <rect x="70" y="600" width="85" height="28" rx="14" fill="#00D4AA" opacity="0.2"/>
    <text x="112" y="621" font-size="11" font-weight="600" text-anchor="middle" fill="#00D4AA">PRESERVED</text>
  </g>

  <!-- Stage 6: Scope Enforcement -->
  <g>
    <!-- Card Background -->
    <rect x="370" y="450" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Navy accent bar at top -->
    <rect x="370" y="450" width="280" height="6" rx="12" fill="#0A2540"/>

    <!-- Icon/Number -->
    <circle cx="400" cy="485" r="18" fill="#0A2540" opacity="0.15"/>
    <text x="400" y="492" font-size="20" font-weight="600" text-anchor="middle" fill="#0A2540">6</text>

    <!-- Title -->
    <text x="390" y="515" font-size="16" font-weight="600" fill="#0A2540">Scope Enforcement</text>

    <!-- Description -->
    <text x="390" y="540" font-size="13" fill="#425466">action:resource:identifier</text>
    <text x="390" y="558" font-size="13" fill="#425466">format → one-way attenuation</text>
    <text x="390" y="576" font-size="13" fill="#425466">only → validation middleware</text>

    <!-- Badge -->
    <rect x="390" y="600" width="85" height="28" rx="14" fill="#0A2540" opacity="0.1"/>
    <text x="432" y="621" font-size="11" font-weight="600" text-anchor="middle" fill="#0A2540">PRESERVED</text>
  </g>

  <!-- Stage 7: Delegation -->
  <g>
    <!-- Card Background -->
    <rect x="690" y="450" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Navy accent bar at top -->
    <rect x="690" y="450" width="280" height="6" rx="12" fill="#0A2540"/>

    <!-- Icon/Number -->
    <circle cx="720" cy="485" r="18" fill="#0A2540" opacity="0.15"/>
    <text x="720" y="492" font-size="20" font-weight="600" text-anchor="middle" fill="#0A2540">7</text>

    <!-- Title -->
    <text x="710" y="515" font-size="16" font-weight="600" fill="#0A2540">Delegation</text>

    <!-- Description -->
    <text x="710" y="540" font-size="13" fill="#425466">Agent A → Agent B with</text>
    <text x="710" y="558" font-size="13" fill="#425466">narrowed scopes → chain</text>
    <text x="710" y="576" font-size="13" fill="#425466">depth ≤5 → SHA-256 hash</text>

    <!-- Badge -->
    <rect x="710" y="600" width="85" height="28" rx="14" fill="#0A2540" opacity="0.1"/>
    <text x="752" y="621" font-size="11" font-weight="600" text-anchor="middle" fill="#0A2540">PRESERVED</text>
  </g>

  <!-- Stage 8: Revocation & Audit -->
  <g>
    <!-- Card Background -->
    <rect x="1010" y="450" width="280" height="220" rx="12" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>

    <!-- Coral accent bar at top -->
    <rect x="1010" y="450" width="280" height="6" rx="12" fill="#E25950"/>

    <!-- Icon/Number -->
    <circle cx="1040" cy="485" r="18" fill="#E25950" opacity="0.15"/>
    <text x="1040" y="492" font-size="20" font-weight="600" text-anchor="middle" fill="#E25950">8</text>

    <!-- Title -->
    <text x="1030" y="515" font-size="16" font-weight="600" fill="#0A2540">Revocation & Audit</text>

    <!-- Description -->
    <text x="1030" y="540" font-size="13" fill="#425466">5-level revocation (token→</text>
    <text x="1030" y="558" font-size="13" fill="#425466">agent→task→chain→app) →</text>
    <text x="1030" y="576" font-size="13" fill="#425466">hash-chained audit → 30+ events</text>

    <!-- Badge -->
    <rect x="1030" y="600" width="85" height="28" rx="14" fill="#E25950" opacity="0.15"/>
    <text x="1072" y="621" font-size="11" font-weight="600" text-anchor="middle" fill="#E25950">PRESERVED</text>
  </g>

  <!-- Arrows Row 2 -->
  <!-- 5 to 6 -->
  <path d="M 330 560 L 370 560" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- 6 to 7 -->
  <path d="M 650 560 L 690 560" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- 7 to 8 -->
  <path d="M 970 560 L 1010 560" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- Connectors between rows -->
  <!-- 4 to 5 (right side, curves down) -->
  <path d="M 1150 350 Q 1150 400, 190 450" stroke="#425466" stroke-width="2" fill="none" marker-end="url(#arrowhead-light)" opacity="0.4" stroke-dasharray="5,5"/>

  <!-- Legend/Key -->
  <g>
    <!-- Background for legend -->
    <rect x="50" y="800" width="1300" height="80" rx="8" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow-light)"/>

    <!-- Left section: Color meanings -->
    <text x="70" y="825" font-size="12" font-weight="600" fill="#0A2540">ARCHITECTURE STAGES:</text>

    <circle cx="70" cy="850" r="6" fill="#635BFF"/>
    <text x="85" y="854" font-size="12" fill="#425466">NEW — App registration &amp; authentication (developer/operator interface)</text>

    <circle cx="450" cy="850" r="6" fill="#00D4AA"/>
    <text x="465" y="854" font-size="12" fill="#425466">PRESERVED — Agent identity through delegation (core pattern)</text>

    <circle cx="870" cy="850" r="6" fill="#0A2540" opacity="0.6"/>
    <text x="885" y="854" font-size="12" fill="#425466">PRESERVED — Scope &amp; delegation enforcement</text>

    <circle cx="1220" cy="850" r="6" fill="#E25950"/>
    <text x="1235" y="854" font-size="12" fill="#425466">PRESERVED — Revocation &amp; audit trail</text>
  </g>

  <!-- Footer note -->
  <text x="700" y="890" font-size="11" fill="#425466" text-anchor="middle" opacity="0.7">
    Pattern: github.com/devonartis/AI-Security-Blueprints/patterns/ephemeral-agent-credentialing/versions/v1.2.md
  </text>
</svg>
