<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#425466"/>
    </marker>
    <marker id="arrowhead-white" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#FFFFFF"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .title { font-size: 22px; font-weight: 700; fill: #FFFFFF; }
      .header { font-size: 16px; font-weight: 600; fill: #0A2540; }
      .subheader { font-size: 14px; font-weight: 600; fill: #0A2540; }
      .step-text { font-size: 13px; font-weight: 400; fill: #0A2540; }
      .subtext { font-size: 11px; font-weight: 400; fill: #425466; }
      .banner-text { font-size: 14px; font-weight: 600; fill: #FFFFFF; }
      .pill-text { font-size: 10px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1400" height="1000" fill="#FFFFFF"/>
  <!-- Title Bar -->
  <rect x="0" y="0" width="1400" height="60" fill="#0A2540" rx="0"/>
  <text x="700.0" y="38.0" text-anchor="middle" class="title">How an App Gets a Credential — End to End</text>
  <!-- OPERATOR LANE -->
  <rect x="20" y="70" width="1360" height="300" fill="#EFF6FF" stroke="#D0D7DE" stroke-width="1"/>
  <rect x="20" y="70" width="140" height="50" fill="#0969DA" rx="6"/>
  <text x="90" y="102" text-anchor="middle" class="pill-text" fill="#FFFFFF">OPERATOR</text>

  <text x="180" y="170" class="step-text" font-weight="600">1. Generate Master Key</text>
  <line x1="360" y1="155" x2="400" y2="155" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="420" y="170" class="step-text" font-weight="600">2. Deploy Broker</text>
  <line x1="600" y1="155" x2="640" y2="155" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="660" y="170" class="step-text" font-weight="600">3. Deploy Token Proxy</text>
  <rect x="860" y="145" width="72" height="24" fill="#CF222E" rx="6"/>
  <text x="896" y="161" text-anchor="middle" class="pill-text">BROKEN</text>
  <line x1="950" y1="155" x2="990" y2="155" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="1010" y="170" class="step-text" font-weight="600">4. Tell dev proxy URL</text>

  <text x="180" y="250" class="subtext" font-style="italic">Requires infrastructure configuration + master key storage</text>
  <!-- DEVELOPER LANE -->
  <rect x="20" y="370" width="1360" height="300" fill="#F0FFF4" stroke="#D0D7DE" stroke-width="1"/>
  <rect x="20" y="370" width="140" height="50" fill="#1A7F37" rx="6"/>
  <text x="90" y="402" text-anchor="middle" class="pill-text" fill="#FFFFFF">DEVELOPER</text>

  <text x="180" y="470" class="step-text" font-weight="600">1. Call POST /token</text>
  <line x1="350" y1="455" x2="390" y2="455" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="410" y="470" class="step-text" font-weight="600">2. First-time agent?</text>

  <!-- Registration path -->
  <rect x="560" y="430" width="420" height="140" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" stroke-dasharray="5,5" rx="6"/>
  <text x="770" y="455" text-anchor="middle" class="subtext" font-weight="600">First-Time Registration (5 calls)</text>
  <text x="575" y="480" class="step-text">• Auth as admin</text>
  <text x="575" y="503" class="step-text">• Create launch token</text>
  <text x="575" y="526" class="step-text">• Generate key pair → Challenge-response</text>
  <text x="575" y="549" class="step-text">• Register identity</text>
  <rect x="990" y="445" width="72" height="24" fill="#9A6700" rx="6"/>
  <text x="1026" y="461" text-anchor="middle" class="pill-text">GAP</text>

  <line x1="360" y1="590" x2="400" y2="590" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="420" y="605" class="step-text" font-weight="600">3. Proxy requests scoped token</text>
  <line x1="650" y1="590" x2="690" y2="590" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="710" y="605" class="step-text" font-weight="600">4. Return JWT</text>

  <text x="180" y="650" class="subtext" font-style="italic">Hand-coded HTTP required. No SDK available.</text>
  <!-- APP LANE -->
  <rect x="20" y="670" width="1360" height="300" fill="#FFF8E1" stroke="#D0D7DE" stroke-width="1"/>
  <rect x="20" y="670" width="140" height="50" fill="#9A6700" rx="6"/>
  <text x="90" y="702" text-anchor="middle" class="pill-text" fill="#FFFFFF">RUNNING APP</text>

  <text x="180" y="770" class="step-text" font-weight="600">1. Present Bearer token</text>
  <line x1="380" y1="755" x2="420" y2="755" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="440" y="770" class="step-text" font-weight="600">2. Validate with broker</text>
  <line x1="680" y1="755" x2="720" y2="755" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="740" y="770" class="step-text" font-weight="600">3. Check scope</text>
  <line x1="920" y1="755" x2="960" y2="755" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <text x="980" y="770" class="step-text" font-weight="600">4. Allow/deny</text>
  <rect x="1150" y="745" width="72" height="24" fill="#CF222E" rx="6"/>
  <text x="1186" y="761" text-anchor="middle" class="pill-text">BROKEN</text>

  <text x="180" y="850" class="subtext" font-style="italic">Every validation = network call to single broker. No JWKS delegation.</text>
</svg>
