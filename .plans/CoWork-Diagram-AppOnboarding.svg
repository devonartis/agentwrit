<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#425466"/>
    </marker>
    <marker id="arrowhead-white" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#FFFFFF"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .title { font-size: 22px; font-weight: 700; fill: #FFFFFF; }
      .header { font-size: 16px; font-weight: 600; fill: #0A2540; }
      .subheader { font-size: 14px; font-weight: 600; fill: #0A2540; }
      .step-text { font-size: 13px; font-weight: 400; fill: #0A2540; }
      .subtext { font-size: 11px; font-weight: 400; fill: #425466; }
      .banner-text { font-size: 14px; font-weight: 600; fill: #FFFFFF; }
      .pill-text { font-size: 10px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1200" height="900" fill="#FFFFFF"/>
  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="60" fill="#0A2540" rx="0"/>
  <text x="600.0" y="38.0" text-anchor="middle" class="title">How Apps Get Onboarded — Current vs. What Production Needs</text>
  <!-- LEFT COLUMN HEADER -->
  <rect x="20" y="70" width="540" height="45" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="70" width="4" height="45" fill="#CF222E" rx="8 0 0 8"/>
  <text x="280" y="98" text-anchor="middle" class="subheader">Current Reality</text>
  <!-- Step 1 -->
  <rect x="20" y="130" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="130" width="4" height="50" fill="#1A7F37" rx="8 0 0 8"/>
  <text x="36" y="154" class="step-text">Operator decides app scopes</text>
  <line x1="290" y1="180" x2="290" y2="200" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 2 -->
  <rect x="20" y="200" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="200" width="4" height="50" fill="#CF222E" rx="8 0 0 8"/>
  <text x="36" y="224" class="step-text">Edit docker-compose.yml or systemd config</text>
  <rect x="480" y="230" width="72" height="18" fill="#CF222E" rx="6"/>
  <text x="516" y="243" class="pill-text">BROKEN</text>
  <line x1="290" y1="250" x2="290" y2="270" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 3 -->
  <rect x="20" y="270" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="270" width="4" height="50" fill="#CF222E" rx="8 0 0 8"/>
  <text x="36" y="294" class="step-text">Paste Admin Master Key into proxy config</text>
  <rect x="480" y="300" width="72" height="18" fill="#CF222E" rx="6"/>
  <text x="516" y="313" class="pill-text">BROKEN</text>
  <line x1="290" y1="320" x2="290" y2="340" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 4 -->
  <rect x="20" y="340" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="340" width="4" height="50" fill="#CF222E" rx="8 0 0 8"/>
  <text x="36" y="364" class="step-text">Deploy a Token Proxy instance</text>
  <rect x="480" y="370" width="72" height="18" fill="#CF222E" rx="6"/>
  <text x="516" y="383" class="pill-text">BROKEN</text>
  <line x1="290" y1="390" x2="290" y2="410" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 5 -->
  <rect x="20" y="410" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="410" width="4" height="50" fill="#CF222E" rx="8 0 0 8"/>
  <text x="36" y="434" class="step-text">Token Proxy self-activates with master key</text>
  <rect x="480" y="440" width="72" height="18" fill="#CF222E" rx="6"/>
  <text x="516" y="453" class="pill-text">BROKEN</text>
  <line x1="290" y1="460" x2="290" y2="480" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 6 -->
  <rect x="20" y="480" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="20" y="480" width="4" height="50" fill="#CF222E" rx="8 0 0 8"/>
  <text x="36" y="504" class="step-text">App invisible — no entity, no name, no tracking</text>
  <rect x="480" y="510" width="72" height="18" fill="#CF222E" rx="6"/>
  <text x="516" y="523" class="pill-text">BROKEN</text>
  <rect x="20" y="550" width="540" height="80" fill="#FFF0F0" stroke="#CF222E" stroke-width="2" rx="8"/>
  <text x="290" y="575" text-anchor="middle" class="step-text" font-weight="600" fill="#CF222E">Result: Adding an app = an</text>
  <text x="290" y="598" text-anchor="middle" class="step-text" font-weight="600" fill="#CF222E">infrastructure deployment,</text>
  <text x="290" y="621" text-anchor="middle" class="step-text" font-weight="600" fill="#CF222E">not an API call.</text>
  <!-- RIGHT COLUMN HEADER -->
  <rect x="640" y="70" width="540" height="45" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="70" width="4" height="45" fill="#0969DA" rx="8 0 0 8"/>
  <text x="910" y="98" text-anchor="middle" class="subheader">What Production Needs</text>
  <!-- Step 1 -->
  <rect x="640" y="130" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="130" width="4" height="50" fill="#1A7F37" rx="8 0 0 8"/>
  <text x="656" y="154" class="step-text">Operator decides app scopes</text>
  <line x1="910" y1="180" x2="910" y2="200" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 2 -->
  <rect x="640" y="200" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="200" width="4" height="50" fill="#0969DA" rx="8 0 0 8"/>
  <text x="656" y="224" class="step-text">CLI: register-app --name --scopes</text>
  <rect x="1100" y="230" width="72" height="18" fill="#0969DA" rx="6"/>
  <text x="1136" y="243" class="pill-text">API CALL</text>
  <line x1="910" y1="250" x2="910" y2="270" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 3 -->
  <rect x="640" y="270" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="270" width="4" height="50" fill="#0969DA" rx="8 0 0 8"/>
  <text x="656" y="294" class="step-text">Broker creates app entity, returns token</text>
  <rect x="1100" y="300" width="72" height="18" fill="#0969DA" rx="6"/>
  <text x="1136" y="313" class="pill-text">API RESPONSE</text>
  <line x1="910" y1="320" x2="910" y2="340" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 4 -->
  <rect x="640" y="340" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="340" width="4" height="50" fill="#0969DA" rx="8 0 0 8"/>
  <text x="656" y="364" class="step-text">Pass activation token to deployment</text>
  <rect x="1100" y="370" width="72" height="18" fill="#0969DA" rx="6"/>
  <text x="1136" y="383" class="pill-text">HANDOFF</text>
  <line x1="910" y1="390" x2="910" y2="410" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 5 -->
  <rect x="640" y="410" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="410" width="4" height="50" fill="#0969DA" rx="8 0 0 8"/>
  <text x="656" y="434" class="step-text">Token Proxy boots with activation token</text>
  <rect x="1100" y="440" width="72" height="18" fill="#0969DA" rx="6"/>
  <text x="1136" y="453" class="pill-text">SECURE</text>
  <line x1="910" y1="460" x2="910" y2="480" stroke="#425466" stroke-width="2" marker-end="url(#arrowhead-dark)"/>
  <!-- Step 6 -->
  <rect x="640" y="480" width="540" height="50" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1" rx="8"/>
  <rect x="640" y="480" width="4" height="50" fill="#1A7F37" rx="8 0 0 8"/>
  <text x="656" y="504" class="step-text">App is named, tracked, auditable</text>
  <rect x="1100" y="510" width="72" height="18" fill="#1A7F37" rx="6"/>
  <text x="1136" y="523" class="pill-text">PRODUCTION</text>
  <rect x="640" y="550" width="540" height="80" fill="#EFF6FF" stroke="#0969DA" stroke-width="2" rx="8"/>
  <text x="910" y="575" text-anchor="middle" class="step-text" font-weight="600" fill="#0969DA">Result: Adding an app = one</text>
  <text x="910" y="598" text-anchor="middle" class="step-text" font-weight="600" fill="#0969DA">CLI command. Works on any</text>
  <text x="910" y="621" text-anchor="middle" class="step-text" font-weight="600" fill="#0969DA">server.</text>
  <!-- Bottom Banner -->
  <rect x="20" y="680" width="1160" height="70" fill="#CF222E" rx="8"/>
  <text x="600" y="715" text-anchor="middle" class="banner-text">BLOCKER: The entire left column is what exists today.</text>
  <text x="600" y="735" text-anchor="middle" class="banner-text">Production cannot scale with infrastructure changes for every app.</text>
</svg>
