<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .phase-title { font-size: 18px; font-weight: bold; font-family: 'Segoe UI', sans-serif; }
      .step-title { font-size: 14px; font-weight: 600; font-family: 'Segoe UI', sans-serif; }
      .step-label { font-size: 12px; font-family: 'Segoe UI', sans-serif; }
      .api-call { font-size: 10px; font-weight: 500; font-family: monospace; fill: #333; }
      .legend-text { font-size: 12px; font-family: 'Segoe UI', sans-serif; }
      .token-state { font-size: 11px; font-weight: 500; font-family: 'Segoe UI', sans-serif; }
      .box-shadow { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0066CC" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#047857" />
    </marker>
    <marker id="ah-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0d5f63" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#CC0000" />
    </marker>
    <linearGradient id="g-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC" /><stop offset="100%" style="stop-color:#0088DD" />
    </linearGradient>
    <linearGradient id="g-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d5f63" /><stop offset="100%" style="stop-color:#0d7377" />
    </linearGradient>
    <linearGradient id="g-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857" /><stop offset="100%" style="stop-color:#00CC88" />
    </linearGradient>
    <linearGradient id="g-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8800" /><stop offset="100%" style="stop-color:#FFAA33" />
    </linearGradient>
  </defs>

  <rect width="1400" height="750" fill="#FAFAFA"/>

  <!-- Phase 1: Setup (Blue) -->
  <rect x="20" y="20" width="260" height="480" rx="8" fill-opacity="0.08" fill="#0066CC"/>
  <rect x="20" y="20" width="260" height="30" fill="url(#g-blue)" rx="4"/>
  <text x="150" y="42" text-anchor="middle" class="phase-title" fill="#FFF">Phase 1: Setup</text>

  <g class="box-shadow">
    <rect x="35" y="65" width="230" height="85" fill="#FFF" stroke="#0066CC" stroke-width="2" rx="6"/>
  </g>
  <text x="150" y="82" text-anchor="middle" class="step-title" fill="#0066CC">1. Operator Registers App</text>
  <text x="45" y="105" class="step-label" fill="#333">Command:</text>
  <text x="45" y="120" class="api-call">awrit app register --name X --scopes Y</text>
  <text x="45" y="138" class="step-label" fill="#333">Receives: client_id + client_secret</text>

  <path d="M 150 150 L 150 175" stroke="#0066CC" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <g class="box-shadow">
    <rect x="35" y="175" width="230" height="310" fill="#FFF" stroke="#0066CC" stroke-width="2" rx="6"/>
  </g>
  <text x="150" y="192" text-anchor="middle" class="step-title" fill="#0066CC">2. App Record Created</text>
  <rect x="45" y="205" width="210" height="270" fill="#F0F4FF" stroke="#0099DD" stroke-width="1" stroke-dasharray="2,2" rx="3"/>
  <text x="50" y="223" class="step-label" fill="#333">App Registration Record:</text>
  <text x="55" y="243" class="step-label" fill="#666">app_id (UUID)</text>
  <text x="55" y="260" class="step-label" fill="#666">app_name</text>
  <text x="55" y="277" class="step-label" fill="#666">client_id + client_secret (hashed)</text>
  <text x="55" y="294" class="step-label" fill="#666">scopes_ceiling: [allowed scopes]</text>
  <text x="55" y="311" class="step-label" fill="#666">ttl_seconds (per-app override)</text>
  <text x="55" y="328" class="step-label" fill="#666">created_at, updated_at</text>
  <text x="50" y="355" class="step-label" fill="#333">Stored in SQLite:</text>
  <text x="55" y="372" class="step-label" fill="#666">apps table (persisted)</text>
  <text x="55" y="389" class="step-label" fill="#666">audit: app_registered event</text>
  <text x="50" y="416" class="step-label" fill="#333">Lifetime: until deregistered</text>
  <text x="50" y="440" class="step-label" fill="#333">Scope ceiling is the policy</text>
  <text x="50" y="457" class="step-label" fill="#333">gate for app launch tokens</text>

  <!-- Phase 2: App Auth (Teal) -->
  <rect x="300" y="20" width="270" height="260" rx="8" fill-opacity="0.08" fill="#0d5f63"/>
  <rect x="300" y="20" width="270" height="30" fill="url(#g-teal)" rx="4"/>
  <text x="435" y="42" text-anchor="middle" class="phase-title" fill="#FFF">Phase 2: App Auth</text>

  <g class="box-shadow">
    <rect x="315" y="65" width="240" height="195" fill="#FFF" stroke="#0d5f63" stroke-width="2" rx="6"/>
  </g>
  <text x="435" y="82" text-anchor="middle" class="step-title" fill="#0d5f63">3. App Authenticates</text>
  <text x="325" y="105" class="step-label" fill="#333">Request:</text>
  <rect x="325" y="115" width="220" height="45" fill="#F5F5F5" stroke="#DDD" stroke-width="1" rx="2"/>
  <text x="330" y="130" class="api-call">POST /v1/app/auth</text>
  <text x="330" y="145" class="api-call">{ client_id, client_secret }</text>
  <text x="325" y="175" class="step-label" fill="#333">Response:</text>
  <text x="335" y="192" class="step-label" fill="#666">App JWT (30 min default TTL)</text>
  <text x="335" y="209" class="step-label" fill="#666">Scopes: app:launch-tokens:*</text>
  <text x="335" y="226" class="step-label" fill="#666">sub: app:{internal_app_id}</text>
  <text x="335" y="243" class="step-label" fill="#666">Audit: app_authenticated event</text>

  <!-- Phase 3: Launch Token (Teal) -->
  <rect x="590" y="20" width="270" height="480" rx="8" fill-opacity="0.08" fill="#0d7377"/>
  <rect x="590" y="20" width="270" height="30" fill="url(#g-teal)" rx="4"/>
  <text x="725" y="42" text-anchor="middle" class="phase-title" fill="#FFF">Phase 3: Launch Token</text>

  <g class="box-shadow">
    <rect x="605" y="65" width="240" height="100" fill="#FFF" stroke="#0d7377" stroke-width="2" rx="6"/>
  </g>
  <text x="725" y="82" text-anchor="middle" class="step-title" fill="#0d7377">4. Create Launch Token</text>
  <rect x="615" y="100" width="220" height="55" fill="#F5F5F5" stroke="#DDD" stroke-width="1" rx="2"/>
  <text x="620" y="115" class="api-call">POST /v1/admin/launch-tokens</text>
  <text x="620" y="130" class="api-call">  or /v1/app/launch-tokens</text>
  <text x="620" y="145" class="api-call">Bearer: admin-jwt or app-jwt</text>

  <path d="M 725 165 L 725 185" stroke="#0d7377" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <g class="box-shadow">
    <rect x="605" y="185" width="240" height="300" fill="#FFF" stroke="#0d7377" stroke-width="2" rx="6"/>
  </g>
  <text x="725" y="205" text-anchor="middle" class="step-title" fill="#0d7377">5. Launch Token Details</text>
  <rect x="615" y="215" width="220" height="260" fill="#d0effa" stroke="#0d5f63" stroke-width="1" stroke-dasharray="2,2" rx="3"/>
  <text x="620" y="235" class="step-label" fill="#333">Format: 32 random bytes (hex)</text>
  <text x="620" y="255" class="step-label" fill="#333">TTL: 30 seconds</text>
  <text x="620" y="280" class="step-label" fill="#333">LaunchTokenRecord:</text>
  <text x="630" y="298" class="step-label" fill="#666">token_hash (SHA256)</text>
  <text x="630" y="315" class="step-label" fill="#666">agent_name</text>
  <text x="630" y="332" class="step-label" fill="#666">orch_id</text>
  <text x="630" y="349" class="step-label" fill="#666">allowed_scope</text>
  <text x="630" y="366" class="step-label" fill="#666">ttl_seconds</text>
  <text x="630" y="383" class="step-label" fill="#666">created_at + expires_at</text>
  <text x="620" y="410" class="step-label" fill="#333">Scope ceiling enforced:</text>
  <text x="630" y="428" class="step-label" fill="#666">allowed_scope must be subset</text>
  <text x="630" y="445" class="step-label" fill="#666">of app's scopes_ceiling</text>
  <text x="620" y="465" class="step-label" fill="#333">Audit: launch_token_issued</text>

  <!-- Phase 4: Agent Registration (Green) -->
  <rect x="880" y="20" width="270" height="480" rx="8" fill-opacity="0.08" fill="#047857"/>
  <rect x="880" y="20" width="270" height="30" fill="url(#g-green)" rx="4"/>
  <text x="1015" y="42" text-anchor="middle" class="phase-title" fill="#FFF">Phase 4: Agent Register</text>

  <g class="box-shadow">
    <rect x="895" y="65" width="240" height="75" fill="#FFF" stroke="#047857" stroke-width="2" rx="6"/>
  </g>
  <text x="1015" y="82" text-anchor="middle" class="step-title" fill="#047857">6. Get Challenge Nonce</text>
  <rect x="905" y="100" width="220" height="30" fill="#F5F5F5" stroke="#DDD" stroke-width="1" rx="2"/>
  <text x="910" y="118" class="api-call">GET /v1/challenge → nonce (64 hex, 30s TTL)</text>

  <path d="M 1015 140 L 1015 155" stroke="#047857" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <g class="box-shadow">
    <rect x="895" y="155" width="240" height="85" fill="#FFF" stroke="#047857" stroke-width="2" rx="6"/>
  </g>
  <text x="1015" y="172" text-anchor="middle" class="step-title" fill="#047857">7. Agent Signs Nonce</text>
  <text x="905" y="195" class="step-label" fill="#333">Agent generates Ed25519 keypair:</text>
  <text x="915" y="212" class="step-label" fill="#666">signature = Ed25519.sign(nonce)</text>
  <text x="915" y="229" class="step-label" fill="#666">Retains private key locally</text>

  <path d="M 1015 240 L 1015 260" stroke="#047857" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <g class="box-shadow">
    <rect x="895" y="260" width="240" height="220" fill="#FFF" stroke="#047857" stroke-width="2" rx="6"/>
  </g>
  <text x="1015" y="277" text-anchor="middle" class="step-title" fill="#047857">8. Register with Broker</text>
  <rect x="905" y="290" width="220" height="55" fill="#F5F5F5" stroke="#DDD" stroke-width="1" rx="2"/>
  <text x="910" y="305" class="api-call">POST /v1/register</text>
  <text x="910" y="320" class="api-call">{ launch_token, nonce, public_key,</text>
  <text x="910" y="335" class="api-call">  signature, requested_scope }</text>

  <text x="905" y="365" class="step-label" fill="#333">Broker verifies:</text>
  <text x="915" y="382" class="step-label" fill="#666">Ed25519 signature valid</text>
  <text x="915" y="399" class="step-label" fill="#666">Launch token not expired/used</text>
  <text x="915" y="416" class="step-label" fill="#666">Scope ⊆ allowed_scope</text>
  <text x="905" y="440" class="step-label" fill="#333">Returns:</text>
  <text x="915" y="457" class="step-label" fill="#666">agent_id (SPIFFE format)</text>
  <text x="915" y="474" class="step-label" fill="#666">access_token (scoped JWT)</text>

  <!-- Phase 5: Token Lifecycle (Amber) -->
  <rect x="1170" y="20" width="210" height="690" rx="8" fill-opacity="0.08" fill="#FFAA33"/>
  <rect x="1170" y="20" width="210" height="30" fill="url(#g-amber)" rx="4"/>
  <text x="1275" y="42" text-anchor="middle" class="phase-title" fill="#FFF">Phase 5: Lifecycle</text>

  <!-- State machine -->
  <circle cx="1275" cy="100" r="30" fill="#FFF" stroke="#047857" stroke-width="2.5"/>
  <text x="1275" y="105" text-anchor="middle" class="token-state" fill="#047857">Active</text>

  <path d="M 1305 90 Q 1330 75 1310 60" stroke="#047857" stroke-width="2" fill="none" marker-end="url(#ah-green)"/>
  <text x="1325" y="78" class="api-call" font-size="9" fill="#047857">renew</text>

  <path d="M 1275 130 L 1275 160" stroke="#0066CC" stroke-width="2" fill="none" marker-end="url(#ah-blue)"/>
  <circle cx="1275" cy="190" r="30" fill="#FFF" stroke="#0066CC" stroke-width="2.5"/>
  <text x="1275" y="195" text-anchor="middle" class="token-state" fill="#0066CC">Renewed</text>
  <text x="1280" y="148" class="api-call" font-size="9" fill="#0066CC">POST /v1/token/renew</text>

  <path d="M 1245 190 L 1210 190" stroke="#CC0000" stroke-width="2" fill="none" marker-end="url(#ah-red)"/>
  <text x="1210" y="183" class="api-call" font-size="9" fill="#CC0000">old revoked</text>

  <path d="M 1275 220 L 1275 250" stroke="#CC0000" stroke-width="2" fill="none" marker-end="url(#ah-red)"/>
  <circle cx="1275" cy="280" r="30" fill="#FFF" stroke="#CC0000" stroke-width="2.5"/>
  <text x="1275" y="285" text-anchor="middle" class="token-state" fill="#CC0000">Revoked</text>
  <text x="1280" y="240" class="api-call" font-size="9" fill="#CC0000">POST /v1/revoke</text>

  <circle cx="1275" cy="365" r="30" fill="#FFF" stroke="#FF8800" stroke-width="2.5"/>
  <text x="1275" y="370" text-anchor="middle" class="token-state" fill="#FF8800">Released</text>
  <text x="1195" y="340" class="api-call" font-size="9" fill="#FF8800">POST /v1/token/release</text>
  <path d="M 1255 315 Q 1230 340 1255 355" stroke="#FF8800" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <circle cx="1275" cy="440" r="30" fill="#FFF" stroke="#999" stroke-width="2.5"/>
  <text x="1275" y="445" text-anchor="middle" class="token-state" fill="#999">Expired</text>
  <text x="1320" y="410" class="api-call" font-size="9" fill="#999">TTL elapsed</text>
  <path d="M 1295 395 L 1290 410" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Delegation -->
  <g class="box-shadow">
    <rect x="1185" y="490" width="180" height="100" fill="#FFF" stroke="#7c3aed" stroke-width="2" rx="6"/>
  </g>
  <text x="1275" y="510" text-anchor="middle" class="step-title" fill="#7c3aed">Delegation</text>
  <text x="1195" y="530" class="step-label" fill="#333">POST /v1/delegate</text>
  <text x="1195" y="548" class="step-label" fill="#666">Narrower scope only</text>
  <text x="1195" y="566" class="step-label" fill="#666">Chain: A→B→C</text>
  <text x="1195" y="584" class="step-label" fill="#666">Chain-level revocable</text>

  <!-- Revocation levels -->
  <g class="box-shadow">
    <rect x="1185" y="610" width="180" height="90" fill="#FFF" stroke="#dc2626" stroke-width="2" rx="6"/>
  </g>
  <text x="1275" y="630" text-anchor="middle" class="step-title" fill="#dc2626">4 Revocation Levels</text>
  <text x="1195" y="650" class="step-label" fill="#666">1. Single token (by JTI)</text>
  <text x="1195" y="667" class="step-label" fill="#666">2. All tokens for agent</text>
  <text x="1195" y="684" class="step-label" fill="#666">3. All tokens for task</text>
  <text x="1195" y="700" class="step-label" fill="#666">4. Entire delegation chain</text>

  <!-- Flow connectors -->
  <path d="M 280 200 L 315 200" stroke="#0066CC" stroke-width="2.5" fill="none" marker-end="url(#ah-blue)"/>
  <text x="290" y="193" class="api-call" fill="#0066CC" font-weight="600">creds</text>

  <path d="M 555 160 L 605 160" stroke="#0d7377" stroke-width="2.5" fill="none" marker-end="url(#ah-teal)"/>
  <text x="573" y="153" class="api-call" fill="#0d7377" font-weight="600">app-jwt</text>

  <path d="M 845 340 L 895 340" stroke="#0d7377" stroke-width="2.5" fill="none" marker-end="url(#ah-teal)"/>
  <text x="862" y="333" class="api-call" fill="#0d7377" font-weight="600">launch</text>

  <path d="M 1135 100 L 1185 100" stroke="#047857" stroke-width="2.5" fill="none" marker-end="url(#ah-green)"/>
  <text x="1152" y="93" class="api-call" fill="#047857" font-weight="600">jwt</text>

  <!-- Legend -->
  <rect x="20" y="710" width="1140" height="30" fill="#FFF" stroke="#CCC" stroke-width="1" rx="4"/>
  <rect x="40" y="718" width="14" height="14" fill="url(#g-blue)" rx="2"/>
  <text x="60" y="730" class="legend-text" fill="#333">Setup (Operator)</text>
  <rect x="220" y="718" width="14" height="14" fill="url(#g-teal)" rx="2"/>
  <text x="240" y="730" class="legend-text" fill="#333">Authentication (App)</text>
  <rect x="440" y="718" width="14" height="14" fill="url(#g-green)" rx="2"/>
  <text x="460" y="730" class="legend-text" fill="#333">Registration (Agent)</text>
  <rect x="660" y="718" width="14" height="14" fill="url(#g-amber)" rx="2"/>
  <text x="680" y="730" class="legend-text" fill="#333">Lifecycle (Token States)</text>
  <text x="920" y="730" class="legend-text" fill="#666">AgentWrit Core — Open Source</text>
</svg>
