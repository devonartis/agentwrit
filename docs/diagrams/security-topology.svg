<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 950" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .zone-label { font-size: 24px; font-weight: bold; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .component-title { font-size: 18px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .component-text { font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .flow-label { font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 500; }
      .security-label { font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 500; }
      .callout-title { font-size: 13px; font-weight: bold; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
    <linearGradient id="zone1Fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0.12" />
    </linearGradient>
    <linearGradient id="zone2Fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4f4a;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="zone3Fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.18" />
    </linearGradient>
    <linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f" /><stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488" /><stop offset="100%" style="stop-color:#0d4f4a" />
    </linearGradient>
    <linearGradient id="cg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669" /><stop offset="100%" style="stop-color:#064e3b" />
    </linearGradient>
    <marker id="aBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <marker id="aTeal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#14b8a6" />
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="950" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" class="zone-label" fill="#0f172a">AgentWrit Security Topology &amp; Trust Boundaries</text>

  <!-- ZONE 1: OPERATOR TRUST -->
  <rect x="50" y="70" width="1100" height="520" rx="20" fill="url(#zone1Fill)" stroke="#1e3a5f" stroke-width="3" stroke-dasharray="8,4"/>
  <g filter="url(#glow)">
    <circle cx="90" cy="90" r="45" fill="#1e3a5f" opacity="0.9"/>
    <text x="90" y="90" text-anchor="middle" dominant-baseline="middle" class="zone-label" fill="white">Zone 1</text>
    <text x="90" y="110" text-anchor="middle" class="security-label" fill="#e2e8f0">Operator</text>
  </g>

  <!-- Zone 1 Components -->
  <rect x="80" y="160" width="200" height="120" rx="12" fill="url(#cg1)" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="85" y="165" width="190" height="110" rx="10" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="180" y="188" text-anchor="middle" class="component-title" fill="#f1f5f9">AA_ADMIN_SECRET</text>
  <text x="180" y="210" text-anchor="middle" class="component-text" fill="#cbd5e1">Shared Secret</text>
  <text x="180" y="230" text-anchor="middle" class="component-text" fill="#cbd5e1">Never leaves</text>
  <text x="180" y="250" text-anchor="middle" class="component-text" fill="#cbd5e1">operator zone</text>
  <text x="180" y="270" text-anchor="middle" class="security-label" fill="#fbbf24">High Sensitivity</text>

  <rect x="340" y="160" width="200" height="120" rx="12" fill="url(#cg1)" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="345" y="165" width="190" height="110" rx="10" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="440" y="188" text-anchor="middle" class="component-title" fill="#f1f5f9">awrit CLI</text>
  <text x="440" y="210" text-anchor="middle" class="component-text" fill="#cbd5e1">Operator Tool</text>
  <text x="440" y="230" text-anchor="middle" class="component-text" fill="#cbd5e1">App Registration</text>
  <text x="440" y="250" text-anchor="middle" class="component-text" fill="#cbd5e1">Scope Control</text>
  <text x="440" y="270" text-anchor="middle" class="security-label" fill="#10b981">Audited</text>

  <rect x="600" y="160" width="200" height="120" rx="12" fill="url(#cg1)" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="605" y="165" width="190" height="110" rx="10" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="700" y="188" text-anchor="middle" class="component-title" fill="#f1f5f9">4-Level Revocation</text>
  <text x="700" y="210" text-anchor="middle" class="component-text" fill="#cbd5e1">Token · Agent</text>
  <text x="700" y="230" text-anchor="middle" class="component-text" fill="#cbd5e1">Task · Chain</text>
  <text x="700" y="250" text-anchor="middle" class="component-text" fill="#cbd5e1">Instant effect</text>
  <text x="700" y="270" text-anchor="middle" class="security-label" fill="#f87171">Authority</text>

  <rect x="860" y="160" width="200" height="120" rx="12" fill="url(#cg1)" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="865" y="165" width="190" height="110" rx="10" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="960" y="188" text-anchor="middle" class="component-title" fill="#f1f5f9">Audit Trail</text>
  <text x="960" y="210" text-anchor="middle" class="component-text" fill="#cbd5e1">SHA-256 Hash Chain</text>
  <text x="960" y="230" text-anchor="middle" class="component-text" fill="#cbd5e1">24 Event Types</text>
  <text x="960" y="250" text-anchor="middle" class="component-text" fill="#cbd5e1">Tamper-Evident</text>
  <text x="960" y="270" text-anchor="middle" class="security-label" fill="#60a5fa">Queryable</text>

  <!-- Zone 1 Operations -->
  <text x="80" y="310" class="component-title" fill="#1e3a5f">Zone 1 Operations:</text>
  <text x="100" y="335" class="component-text" fill="#334155">App registration with scope ceiling</text>
  <text x="100" y="358" class="component-text" fill="#334155">Revocation authority across all 4 levels</text>
  <text x="100" y="381" class="component-text" fill="#334155">Audit trail inspection and compliance</text>
  <text x="100" y="404" class="component-text" fill="#334155">Token TTL configuration (default: 5 min, max: 24h)</text>
  <text x="100" y="427" class="component-text" fill="#334155">Launch token creation with scope ceiling</text>

  <!-- ZONE 2: APP TRUST -->
  <rect x="150" y="300" width="900" height="230" rx="16" fill="url(#zone2Fill)" stroke="#0d9488" stroke-width="3" stroke-dasharray="8,4"/>
  <g filter="url(#glow)">
    <circle cx="190" cy="320" r="40" fill="#0d9488" opacity="0.95"/>
    <text x="190" y="320" text-anchor="middle" dominant-baseline="middle" class="zone-label" fill="white">Zone 2</text>
    <text x="190" y="340" text-anchor="middle" class="security-label" fill="#a7f3d0">App</text>
  </g>

  <rect x="300" y="340" width="190" height="110" rx="12" fill="url(#cg2)" stroke="#0d9488" stroke-width="2"/>
  <rect x="305" y="345" width="180" height="100" rx="10" fill="none" stroke="#5eead4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="395" y="365" text-anchor="middle" class="component-title" fill="#ecfdf5">Client Creds</text>
  <text x="395" y="385" text-anchor="middle" class="component-text" fill="#a7f3d0">client_id</text>
  <text x="395" y="405" text-anchor="middle" class="component-text" fill="#a7f3d0">client_secret</text>
  <text x="395" y="425" text-anchor="middle" class="component-text" fill="#a7f3d0">Per Application</text>
  <text x="395" y="445" text-anchor="middle" class="security-label" fill="#34d399">Secure</text>

  <rect x="550" y="340" width="190" height="110" rx="12" fill="url(#cg2)" stroke="#0d9488" stroke-width="2"/>
  <rect x="555" y="345" width="180" height="100" rx="10" fill="none" stroke="#5eead4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="645" y="365" text-anchor="middle" class="component-title" fill="#ecfdf5">App JWT</text>
  <text x="645" y="385" text-anchor="middle" class="component-text" fill="#a7f3d0">app:launch-tokens:*</text>
  <text x="645" y="405" text-anchor="middle" class="component-text" fill="#a7f3d0">30 min default TTL</text>
  <text x="645" y="425" text-anchor="middle" class="component-text" fill="#a7f3d0">Scoped to ceiling</text>
  <text x="645" y="445" text-anchor="middle" class="security-label" fill="#34d399">EdDSA Signed</text>

  <rect x="800" y="340" width="190" height="110" rx="12" fill="url(#cg2)" stroke="#0d9488" stroke-width="2"/>
  <rect x="805" y="345" width="180" height="100" rx="10" fill="none" stroke="#5eead4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="895" y="365" text-anchor="middle" class="component-title" fill="#ecfdf5">Scope Ceiling</text>
  <text x="895" y="385" text-anchor="middle" class="component-text" fill="#a7f3d0">Registered max</text>
  <text x="895" y="405" text-anchor="middle" class="component-text" fill="#a7f3d0">scope boundary</text>
  <text x="895" y="425" text-anchor="middle" class="component-text" fill="#a7f3d0">Enforced at issue</text>
  <text x="895" y="445" text-anchor="middle" class="security-label" fill="#34d399">Immutable</text>

  <!-- ZONE 3: AGENT TRUST -->
  <rect x="250" y="465" width="700" height="120" rx="14" fill="url(#zone3Fill)" stroke="#059669" stroke-width="3" stroke-dasharray="8,4"/>
  <g filter="url(#glow)">
    <circle cx="290" cy="485" r="35" fill="#059669" opacity="1"/>
    <text x="290" y="485" text-anchor="middle" dominant-baseline="middle" class="zone-label" fill="white">Zone 3</text>
    <text x="290" y="505" text-anchor="middle" class="security-label" fill="#a7f3d0">Agent</text>
  </g>

  <rect x="370" y="480" width="170" height="90" rx="10" fill="url(#cg3)" stroke="#059669" stroke-width="2"/>
  <rect x="374" y="484" width="162" height="82" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="455" y="503" text-anchor="middle" class="component-title" fill="#ecfdf5">Ed25519</text>
  <text x="455" y="523" text-anchor="middle" class="component-text" fill="#a7f3d0">Per-instance keypair</text>
  <text x="455" y="543" text-anchor="middle" class="component-text" fill="#a7f3d0">Challenge-response</text>
  <text x="455" y="563" text-anchor="middle" class="security-label" fill="#10b981">No Shared Secret</text>

  <rect x="590" y="480" width="170" height="90" rx="10" fill="url(#cg3)" stroke="#059669" stroke-width="2"/>
  <rect x="594" y="484" width="162" height="82" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="675" y="503" text-anchor="middle" class="component-title" fill="#ecfdf5">Agent JWT</text>
  <text x="675" y="523" text-anchor="middle" class="component-text" fill="#a7f3d0">Scope ≤ launch token</text>
  <text x="675" y="543" text-anchor="middle" class="component-text" fill="#a7f3d0">SPIFFE identity</text>
  <text x="675" y="563" text-anchor="middle" class="security-label" fill="#10b981">Bounded &amp; Ephemeral</text>

  <rect x="810" y="480" width="130" height="90" rx="10" fill="url(#cg3)" stroke="#059669" stroke-width="2"/>
  <rect x="814" y="484" width="122" height="82" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="875" y="503" text-anchor="middle" class="component-title" fill="#ecfdf5">Renewal</text>
  <text x="875" y="523" text-anchor="middle" class="component-text" fill="#a7f3d0">Old revoked</text>
  <text x="875" y="543" text-anchor="middle" class="component-text" fill="#a7f3d0">New issued</text>
  <text x="875" y="563" text-anchor="middle" class="security-label" fill="#10b981">Safe Chain</text>

  <!-- Flow arrows -->
  <path d="M 440 310 L 895 310" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#aBlue)" stroke-dasharray="5,3"/>
  <rect x="600" y="293" width="180" height="28" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1"/>
  <text x="690" y="312" text-anchor="middle" class="flow-label" fill="#334155">scope ceiling enforcement</text>

  <path d="M 490 395 L 550 395" stroke="#14b8a6" stroke-width="2.5" fill="none" marker-end="url(#aTeal)"/>
  <path d="M 645 450 L 645 480" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#aGreen)"/>
  <rect x="575" y="455" width="130" height="24" rx="6" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="640" y="472" text-anchor="middle" class="flow-label" fill="#047857">bounded by ceiling</text>

  <!-- SECURITY PROPERTIES -->
  <rect x="60" y="620" width="260" height="140" rx="10" fill="#f0f9ff" stroke="#0369a1" stroke-width="2"/>
  <rect x="65" y="625" width="250" height="130" rx="8" fill="none" stroke="#0369a1" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="190" y="648" text-anchor="middle" class="callout-title" fill="#0c4a6e">Challenge-Response</text>
  <text x="75" y="670" class="component-text" fill="#164e63">Ed25519 keypair per</text>
  <text x="75" y="690" class="component-text" fill="#164e63">agent instance</text>
  <text x="75" y="710" class="component-text" fill="#164e63">Zero shared secrets</text>
  <text x="75" y="730" class="component-text" fill="#164e63">at the agent level</text>

  <rect x="360" y="620" width="260" height="140" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <rect x="365" y="625" width="250" height="130" rx="8" fill="none" stroke="#15803d" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="490" y="648" text-anchor="middle" class="callout-title" fill="#14532d">Hash-Chain Audit</text>
  <text x="375" y="670" class="component-text" fill="#1b4332">Tamper-evident trail</text>
  <text x="375" y="690" class="component-text" fill="#1b4332">24 event types logged</text>
  <text x="375" y="710" class="component-text" fill="#1b4332">Persistent to SQLite</text>
  <text x="375" y="730" class="component-text" fill="#1b4332">Queryable by operator</text>

  <rect x="660" y="620" width="260" height="140" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <rect x="665" y="625" width="250" height="130" rx="8" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="790" y="648" text-anchor="middle" class="callout-title" fill="#7f1d1d">Scope Attenuation</text>
  <text x="675" y="670" class="component-text" fill="#5f1313">Scopes can only narrow</text>
  <text x="675" y="690" class="component-text" fill="#5f1313">Never escalate</text>
  <text x="675" y="710" class="component-text" fill="#5f1313">Delegation preserves</text>
  <text x="675" y="730" class="component-text" fill="#5f1313">original principal</text>

  <rect x="960" y="620" width="200" height="140" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <rect x="965" y="625" width="190" height="130" rx="8" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="1060" y="648" text-anchor="middle" class="callout-title" fill="#581c87">Token TTL</text>
  <text x="970" y="670" class="component-text" fill="#4c1d95">Default: 5 min</text>
  <text x="970" y="690" class="component-text" fill="#4c1d95">Max: 24h (configurable)</text>
  <text x="970" y="710" class="component-text" fill="#4c1d95">Per-app override</text>
  <text x="970" y="730" class="component-text" fill="#4c1d95">Revocable at 4 levels</text>

  <!-- Legend -->
  <text x="60" y="800" class="component-title" fill="#0f172a">Trust Model:</text>
  <text x="220" y="800" class="component-text" fill="#334155">Zone 1 (Operator) controls scope ceilings, revocation, and audit.</text>
  <text x="220" y="820" class="component-text" fill="#334155">Zone 2 (App) authenticates and creates launch tokens bounded by the ceiling.</text>
  <text x="220" y="840" class="component-text" fill="#334155">Zone 3 (Agent) registers with Ed25519, receives scoped JWT. No shared secrets at the agent level.</text>
</svg>
