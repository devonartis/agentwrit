name: CodeQL

# DISABLED: CodeQL requires GitHub Code Scanning, which is a GitHub
# Advanced Security (GHAS) feature on private repos. devonartis/agentauth
# is currently private without GHAS, so github/codeql-action/analyze
# fails at the SARIF upload step.
#
# Re-enable when:
#   (a) the repo flips public (Phase 4 of release strategy — GHAS is
#       free on public repos), OR
#   (b) GHAS is purchased for the private repo (~$49/committer/mo).
#
# Tracking: TD-VUL-006 in TECH-DEBT.md.
#
# The file is kept (not deleted) so the re-enable is a simple trigger
# swap — uncomment the `on:` block below, delete this comment header,
# and push.

on:
  # Disabled until public flip — see header comment.
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@f94817b9f0deeb3871261446912ae8f854d1b675  # codeql-bundle-v2.25.1
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@f94817b9f0deeb3871261446912ae8f854d1b675  # codeql-bundle-v2.25.1
      - uses: github/codeql-action/analyze@f94817b9f0deeb3871261446912ae8f854d1b675  # codeql-bundle-v2.25.1
        with:
          category: "/language:${{ matrix.language }}"
