services:
  broker:
    build: .
    ports:
      - "${AA_HOST_PORT:-8080}:8080"
    environment:
      - AA_PORT=8080
      - AA_ADMIN_SECRET=${AA_ADMIN_SECRET:-change-me-in-production}
      - AA_SEED_TOKENS=${AA_SEED_TOKENS:-false}
      - AA_LOG_LEVEL=${AA_LOG_LEVEL:-standard}
    networks:
      - agentauth-net

  sidecar:
    image: curlimages/curl:8.11.1
    command: ["sleep", "infinity"]
    depends_on:
      - broker
    networks:
      - agentauth-net

networks:
  agentauth-net:
    driver: bridge
