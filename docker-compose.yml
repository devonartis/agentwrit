services:
  broker:
    build:
      context: .
      target: broker
    ports:
      - "${AA_HOST_PORT:-8080}:8080"
    environment:
      - AA_PORT=8080
      - AA_ADMIN_SECRET=${AA_ADMIN_SECRET:-change-me-in-production}
      - AA_SEED_TOKENS=${AA_SEED_TOKENS:-false}
      - AA_LOG_LEVEL=${AA_LOG_LEVEL:-standard}
      - AA_DB_PATH=${AA_DB_PATH:-/data/agentauth.db}
      - AA_TLS_MODE=${AA_TLS_MODE:-none}
      - AA_TLS_CERT=${AA_TLS_CERT:-}
      - AA_TLS_KEY=${AA_TLS_KEY:-}
      - AA_TLS_CLIENT_CA=${AA_TLS_CLIENT_CA:-}
      - AA_AUDIENCE=${AA_AUDIENCE:-}
    volumes:
      - broker-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/health"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - agentauth-net

  sidecar:
    build:
      context: .
      target: sidecar
    ports:
      - "${AA_SIDECAR_HOST_PORT:-8081}:8081"
    environment:
      - AA_BROKER_URL=http://broker:8080
      - AA_ADMIN_SECRET=${AA_ADMIN_SECRET:-change-me-in-production}
      - AA_SIDECAR_SCOPE_CEILING=${AA_SIDECAR_SCOPE_CEILING:-read:data:*,write:data:*}
      - AA_SIDECAR_PORT=8081
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - agentauth-net

volumes:
  broker-data:

networks:
  agentauth-net:
    driver: bridge
