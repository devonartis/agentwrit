# UDS overlay — two sidecars on Unix domain sockets, no TCP ports.
# Usage: docker compose -f docker-compose.yml -f docker-compose.uds.yml up -d
#
# This overlay:
#   1. Converts the default sidecar to UDS mode (app1.sock)
#   2. Adds a second sidecar with different scopes (app2.sock)
#   3. Adds a test-client container with curl for UDS client testing
#   4. All three share a volume at /var/run/agentauth/
services:
  sidecar:
    environment:
      - AA_SOCKET_PATH=/var/run/agentauth/app1.sock
      - AA_SIDECAR_SCOPE_CEILING=read:data:*,write:data:*
    volumes:
      - uds-sockets:/var/run/agentauth

  sidecar-app2:
    build:
      context: .
      target: sidecar
    environment:
      - AA_BROKER_URL=http://broker:8080
      - AA_ADMIN_SECRET=${AA_ADMIN_SECRET:-change-me-in-production}
      - AA_SIDECAR_SCOPE_CEILING=read:logs:*
      - AA_SIDECAR_PORT=8082
      - AA_SOCKET_PATH=/var/run/agentauth/app2.sock
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - uds-sockets:/var/run/agentauth
    networks:
      - agentauth-net

  test-client:
    image: curlimages/curl:latest
    user: "0:0"
    command: ["sleep", "3600"]
    volumes:
      - uds-sockets:/var/run/agentauth
    depends_on:
      - sidecar
      - sidecar-app2
    networks:
      - agentauth-net

volumes:
  uds-sockets:
